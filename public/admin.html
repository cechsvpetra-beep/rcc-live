<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RCC Admin</title>

<style>
:root{
  --bg:#0b0f14;
  --panel:#121a25;
  --panel2:#16202c;
  --line:#243244;
  --text:#eef4fb;
  --muted:#9db0c5;
  --green:#76ff9f;
  --green2:#21d36d;
  --danger:#ff6e6e;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top left,#112034 0%, #0b0f14 45%, #091019 100%);
  color:var(--text);
  padding:16px;
}

h1,h2{
  margin:0 0 14px 0;
}

.wrap{
  max-width:1400px;
  margin:0 auto;
}

.card{
  background:linear-gradient(180deg,#121923 0%, #0f151e 100%);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 10px 24px rgba(0,0,0,.18);
}

.grid5{
  display:grid;
  grid-template-columns:repeat(5,minmax(160px,1fr));
  gap:12px;
}

label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
  font-weight:bold;
}

input, select{
  width:100%;
  background:#0f1620;
  color:var(--text);
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.btn{
  border:none;
  border-radius:12px;
  padding:12px 16px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#08110c;
}

.btn.secondary{
  background:#243141;
  color:var(--text);
}

.btn.danger{
  background:linear-gradient(135deg,#ff8a8a,#ff5a5a);
  color:white;
}

.info{
  color:var(--muted);
  font-size:14px;
  margin-bottom:12px;
}

.tableWrap{
  overflow:auto;
  border:1px solid var(--line);
  border-radius:14px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:12px 10px;
  border-bottom:1px solid #1e2a38;
  text-align:left;
  vertical-align:middle;
}

th{
  background:#131c27;
  color:#b8c7d7;
  font-size:13px;
  text-transform:uppercase;
}

.status{
  margin-top:10px;
  font-size:14px;
  color:var(--green);
}

.checkbox{
  transform:scale(1.2);
}

.teamThumb{
  width:70px;
  height:50px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid #2b3a4d;
  background:#101722;
}

.placeholder{
  width:70px;
  height:50px;
  border-radius:8px;
  border:1px dashed #2b3a4d;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#8ea0b3;
  font-size:12px;
}

.fileInput{
  min-width:180px;
}

@media (max-width:900px){
  .grid5{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <h1>RCC Admin</h1>
    <div class="info">Tu nastavíš názvy sektorov, aktívne tímy, názvy tímov, stanovištia a nahráš foto tímu.</div>

    <div class="actions">
      <button class="btn" onclick="saveSetup()">Uložiť nastavenie</button>
      <button class="btn secondary" onclick="loadSetup()">Obnoviť dáta</button>
      <button class="btn danger" onclick="resetCatches()">Vymazať všetky úlovky</button>
      <a class="btn secondary" href="/live.html" style="text-decoration:none;display:inline-flex;align-items:center;">Otvoriť live</a>
      <a class="btn secondary" href="/judge.html" style="text-decoration:none;display:inline-flex;align-items:center;">Otvoriť judge</a>
    </div>

    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <h2>Názvy sektorov</h2>
    <div class="grid5">
      <div>
        <label>Sektor A</label>
        <input id="sectorA" type="text">
      </div>
      <div>
        <label>Sektor B</label>
        <input id="sectorB" type="text">
      </div>
      <div>
        <label>Sektor C</label>
        <input id="sectorC" type="text">
      </div>
      <div>
        <label>Sektor D</label>
        <input id="sectorD" type="text">
      </div>
      <div>
        <label>Sektor E</label>
        <input id="sectorE" type="text">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Tímy</h2>
    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Aktívny</th>
            <th>Názov tímu</th>
            <th>Sektor</th>
            <th>Stanovište</th>
            <th>Foto</th>
            <th>Nahrať foto</th>
          </tr>
        </thead>
        <tbody id="teamBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let setupData = null;

function setStatus(text, ok = true){
  const el = document.getElementById("status");
  el.textContent = text;
  el.style.color = ok ? "#76ff9f" : "#ff8080";
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function photoCell(photo){
  if(photo){
    return `<img class="teamThumb" src="${photo}" alt="Foto tímu">`;
  }
  return `<div class="placeholder">bez foto</div>`;
}

function renderTeams(teams){
  const body = document.getElementById("teamBody");
  body.innerHTML = "";

  teams.forEach(team => {
    body.innerHTML += `
      <tr>
        <td>${team.id}</td>
        <td><input class="checkbox" type="checkbox" id="active_${team.id}" ${team.active ? "checked" : ""}></td>
        <td><input type="text" id="name_${team.id}" value="${escapeHtml(team.name)}"></td>
        <td>
          <select id="sector_${team.id}">
            <option value="A" ${team.sector === "A" ? "selected" : ""}>A</option>
            <option value="B" ${team.sector === "B" ? "selected" : ""}>B</option>
            <option value="C" ${team.sector === "C" ? "selected" : ""}>C</option>
            <option value="D" ${team.sector === "D" ? "selected" : ""}>D</option>
            <option value="E" ${team.sector === "E" ? "selected" : ""}>E</option>
          </select>
        </td>
        <td><input type="text" id="peg_${team.id}" value="${escapeHtml(String(team.peg))}"></td>
        <td id="photoPreview_${team.id}">${photoCell(team.photo)}</td>
        <td>
          <input class="fileInput" type="file" id="photo_${team.id}" accept="image/*">
          <div style="margin-top:8px;">
            <button class="btn secondary" onclick="uploadTeamPhoto(${team.id})">Nahrať foto</button>
          </div>
        </td>
      </tr>
    `;
  });
}

async function loadSetup(){
  setStatus("Načítavam…");
  const res = await fetch("/api/admin/setup", { cache: "no-store" });
  setupData = await res.json();

  document.getElementById("sectorA").value = setupData.sectors.A.name || "Sektor A";
  document.getElementById("sectorB").value = setupData.sectors.B.name || "Sektor B";
  document.getElementById("sectorC").value = setupData.sectors.C.name || "Sektor C";
  document.getElementById("sectorD").value = setupData.sectors.D.name || "Sektor D";
  document.getElementById("sectorE").value = setupData.sectors.E.name || "Sektor E";

  renderTeams(setupData.teams);
  setStatus("Dáta načítané");
}

async function saveSetup(){
  const teams = [];

  for(let i = 1; i <= 50; i++){
    const existing = setupData.teams.find(t => Number(t.id) === i) || {};
    teams.push({
      id: i,
      active: document.getElementById("active_" + i).checked,
      name: document.getElementById("name_" + i).value.trim() || ("Tím " + i),
      sector: document.getElementById("sector_" + i).value,
      peg: document.getElementById("peg_" + i).value.trim() || String(i),
      photo: existing.photo || null
    });
  }

  const payload = {
    sectors: {
      A: { code: "A", name: document.getElementById("sectorA").value.trim() || "Sektor A" },
      B: { code: "B", name: document.getElementById("sectorB").value.trim() || "Sektor B" },
      C: { code: "C", name: document.getElementById("sectorC").value.trim() || "Sektor C" },
      D: { code: "D", name: document.getElementById("sectorD").value.trim() || "Sektor D" },
      E: { code: "E", name: document.getElementById("sectorE").value.trim() || "Sektor E" }
    },
    teams
  };

  const res = await fetch("/api/admin/setup", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const out = await res.json();

  if(out.ok){
    setupData.teams = teams;
    setStatus("Nastavenie uložené");
  } else {
    setStatus("Chyba pri ukladaní", false);
  }
}

async function uploadTeamPhoto(teamId){
  const fileInput = document.getElementById("photo_" + teamId);
  const file = fileInput.files[0];

  if(!file){
    setStatus("Najprv vyber foto tímu", false);
    return;
  }

  const form = new FormData();
  form.append("teamId", teamId);
  form.append("photo", file);

  const res = await fetch("/api/admin/team-photo", {
    method: "POST",
    body: form
  });

  const out = await res.json();

  if(out.ok){
    const team = setupData.teams.find(t => Number(t.id) === Number(teamId));
    if(team){
      team.photo = out.photo;
    }
    document.getElementById("photoPreview_" + teamId).innerHTML = photoCell(out.photo);
    fileInput.value = "";
    setStatus("Foto tímu nahraté");
  } else {
    setStatus("Chyba pri nahrávaní foto tímu", false);
  }
}

async function resetCatches(){
  const yes = confirm("Naozaj chceš vymazať všetky úlovky?");
  if(!yes) return;

  const res = await fetch("/api/admin/reset-catches", {
    method: "POST",
    headers: { "Content-Type": "application/json" }
  });

  const out = await res.json();

  if(out.ok){
    setStatus("Všetky úlovky boli vymazané");
  } else {
    setStatus("Chyba pri mazaní úlovkov", false);
  }
}

loadSetup();
</script>
</body>
</html>
