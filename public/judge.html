<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RCC zápis úlovku</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  margin:0;
  padding:20px;
}
.box{
  max-width:500px;
  margin:auto;
  background:#1a1a1a;
  padding:20px;
  border-radius:14px;
}
h1{
  margin-top:0;
}
label{
  display:block;
  margin-top:12px;
  margin-bottom:6px;
}
select,input,button{
  width:100%;
  padding:14px;
  font-size:18px;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
}
button{
  background:#2ecc71;
  color:white;
  font-weight:bold;
  margin-top:20px;
}
#msg{
  margin-top:10px;
  font-weight:bold;
}
.status{
  margin-top:10px;
  font-size:14px;
  color:#9ad0ff;
}
.queue{
  margin-top:8px;
  font-size:14px;
  color:#f1c40f;
}
</style>
</head>

<body>

<div class="box">

<h1>Zápis úlovku</h1>

<label>Sektor</label>
<select id="sector"></select>

<label>Tím</label>
<select id="team"></select>

<label>Váha (kg)</label>
<input type="number" id="weight" step="0.01">

<label>Fotka</label>
<input type="file" id="photo" accept="image/*" capture="environment">

<button onclick="saveCatch()">Uložiť úlovok</button>

<div class="status" id="netStatus"></div>
<div class="queue" id="queueInfo"></div>
<div id="msg"></div>

</div>

<script>
let teams = [];
let activeSectors = [];

const sectorSelect = document.getElementById("sector");
const teamSelect = document.getElementById("team");
const netStatus = document.getElementById("netStatus");
const queueInfo = document.getElementById("queueInfo");
const msg = document.getElementById("msg");

const STORAGE_KEY = "rcc_offline_catches";

function updateNetStatus(){
  netStatus.textContent = navigator.onLine ? "Online režim" : "Offline režim";
  netStatus.style.color = navigator.onLine ? "#2ecc71" : "#f1c40f";
}

function getQueue(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  }catch{
    return [];
  }
}

function setQueue(items){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  updateQueueInfo();
}

function updateQueueInfo(){
  const count = getQueue().length;
  queueInfo.textContent = count > 0 ? `Neodoslané úlovky: ${count}` : "";
}

async function loadSettings(){
  const res = await fetch("/settings");
  const data = await res.json();

  activeSectors = data.activeSectors;

  sectorSelect.innerHTML = "";

  activeSectors.forEach(s=>{
    const o = document.createElement("option");
    o.value = s;
    o.textContent = "Sektor " + s;
    sectorSelect.appendChild(o);
  });
}

async function loadTeams(){
  const res = await fetch("/teams");
  teams = await res.json();
  updateTeams();
}

function updateTeams(){
  const sector = sectorSelect.value;
  teamSelect.innerHTML = "";

  teams
    .filter(t=>t.sector===sector)
    .forEach(t=>{
      const o = document.createElement("option");
      o.value = t.id;
      o.textContent = t.name;
      teamSelect.appendChild(o);
    });
}

sectorSelect.addEventListener("change", updateTeams);

async function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function sendCatch(item){
  const form = new FormData();
  form.append("team", item.team);
  form.append("weight", item.weight);

  if(item.photoBase64){
    const res = await fetch(item.photoBase64);
    const blob = await res.blob();
    form.append("photo", blob, "photo.jpg");
  }

  const response = await fetch("/catch", {
    method: "POST",
    body: form
  });

  return await response.text();
}

async function flushQueue(){
  if(!navigator.onLine) return;

  const queue = getQueue();
  if(!queue.length) return;

  const remaining = [];

  for(const item of queue){
    try{
      const text = await sendCatch(item);
      if(text !== "ok"){
        remaining.push(item);
      }
    }catch{
      remaining.push(item);
    }
  }

  setQueue(remaining);
}

async function saveCatch(){
  const team = teamSelect.value;
  const weight = document.getElementById("weight").value;
  const photoFile = document.getElementById("photo").files[0];

  if(!weight){
    msg.textContent = "Zadaj váhu";
    msg.style.color = "orange";
    return;
  }

  const item = {
    team,
    weight,
    photoBase64: photoFile ? await fileToBase64(photoFile) : null
  };

  if(!navigator.onLine){
    const queue = getQueue();
    queue.push(item);
    setQueue(queue);

    msg.textContent = "Uložené offline – odošle sa neskôr";
    msg.style.color = "#f1c40f";
    document.getElementById("weight").value = "";
    document.getElementById("photo").value = "";
    return;
  }

  try{
    const text = await sendCatch(item);

    if(text === "ok"){
      msg.textContent = "Úlovok uložený";
      msg.style.color = "#2ecc71";
      document.getElementById("weight").value = "";
      document.getElementById("photo").value = "";
      await flushQueue();
    }else{
      const queue = getQueue();
      queue.push(item);
      setQueue(queue);

      msg.textContent = "Server neodpovedal správne – uložené offline";
      msg.style.color = "#f1c40f";
    }
  }catch{
    const queue = getQueue();
    queue.push(item);
    setQueue(queue);

    msg.textContent = "Bez signálu – uložené offline";
    msg.style.color = "#f1c40f";
  }
}

window.addEventListener("online", async ()=>{
  updateNetStatus();
  await flushQueue();
});

window.addEventListener("offline", ()=>{
  updateNetStatus();
});

async function init(){
  updateNetStatus();
  updateQueueInfo();
  await loadSettings();
  await loadTeams();
  await flushQueue();
}

init();
</script>

</body>
</html>
