<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RCC Live tabuľka</title>

<style>
body{
  background:#0b0d10;
  color:white;
  font-family:Arial,sans-serif;
  padding:24px;
  margin:0;
}

h1{
  font-size:28px;
  margin:0 0 20px 0;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.btn{
  background:#1c1f24;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.btn:hover{
  background:#2b3138;
}

.hidden{
  display:none;
}

/* tabuľka */

table{
  width:100%;
  border-collapse:collapse;
  font-size:20px;
  background:#0f1318;
}

th{
  background:#1c1f24;
  padding:14px;
  text-align:left;
  color:#ffe15a;
}

td{
  padding:14px;
  border-bottom:1px solid #1d232b;
}

tbody tr.clickable{
  cursor:pointer;
}

tbody tr.clickable:hover{
  background:#17202a;
}

.weight{
  color:#7CFC98;
  font-weight:bold;
}

/* karty */

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:16px;
}

.card{
  background:#12171d;
  border:1px solid #242a31;
  border-radius:12px;
  padding:16px;
}

.card h3{
  margin:0 0 6px 0;
}

.card img{
  width:100%;
  border-radius:8px;
  margin-top:10px;
}

.meta{
  color:#9fb2c4;
  font-size:14px;
}

.summary{
  display:flex;
  gap:20px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.box{
  background:#12171d;
  border:1px solid #242a31;
  border-radius:10px;
  padding:14px;
}

.label{
  font-size:13px;
  color:#9fb2c4;
}

.value{
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
<h1>RCC Live tabuľka</h1>
<button class="btn hidden" id="backBtn" onclick="showMain()">← Späť</button>
</div>

<!-- hlavná tabuľka -->

<div id="mainView">
<table>
<thead>
<tr>
<th>#</th>
<th>Tím</th>
<th>kg</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- detail tímu -->

<div id="teamView" class="hidden">

<h2 id="teamTitle"></h2>

<div class="summary">

<div class="box">
<div class="label">Celková váha</div>
<div class="value" id="sumWeight"></div>
</div>

<div class="box">
<div class="label">Počet rýb</div>
<div class="value" id="sumCount"></div>
</div>

<div class="box">
<div class="label">Najväčšia ryba</div>
<div class="value" id="sumBiggest"></div>
</div>

</div>

<div class="cards" id="catchCards"></div>

</div>

<script>

let state=null

function showMain(){
document.getElementById("teamView").classList.add("hidden")
document.getElementById("mainView").classList.remove("hidden")
document.getElementById("backBtn").classList.add("hidden")
}

function showTeam(teamId){

const team=state.lb.find(t=>t.id===teamId)

const catches=state.teamCatches[teamId] || []

document.getElementById("teamTitle").innerText=team.name

document.getElementById("sumWeight").innerText=team.total.toFixed(2)+" kg"
document.getElementById("sumCount").innerText=team.count
document.getElementById("sumBiggest").innerText=team.biggest.toFixed(2)+" kg"

document.getElementById("mainView").classList.add("hidden")
document.getElementById("teamView").classList.remove("hidden")
document.getElementById("backBtn").classList.remove("hidden")

const container=document.getElementById("catchCards")

container.innerHTML=""

if(!catches.length){
container.innerHTML="Žiadne úlovky"
return
}

catches.forEach(c=>{

container.innerHTML+=`

<div class="card">

<h3>${Number(c.weight).toFixed(2)} kg</h3>

<div class="meta">

Úlovok #${c.number || "-"}<br>
${new Date(c.time).toLocaleString("sk-SK")}

</div>

${c.photo ? `<img src="${c.photo}">` : ""}

</div>

`

})

}

function renderMain(){

const body=document.getElementById("tableBody")

body.innerHTML=""

state.lb.forEach((t,i)=>{

body.innerHTML+=`

<tr class="clickable" onclick="showTeam(${t.id})">

<td>${i+1}</td>
<td>${t.name}</td>
<td class="weight">${t.total.toFixed(2)}</td>

</tr>

`

})

}

async function load(){

const r=await fetch("/api/state")

state=await r.json()

renderMain()

}

load()

setInterval(load,4000)

</script>

</body>
</html>
