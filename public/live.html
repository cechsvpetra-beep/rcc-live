<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RCC Live tabuľka</title>

<style>
:root{
  --bg:#f3f0e9;
  --panel:#e8e3d9;
  --panel2:#f8f6f1;
  --text:#1f1f1f;
  --muted:#6f6a5f;
  --line:#ddd7cb;
  --gold1:#8e8a32;
  --gold2:#d8b650;
  --goldText:#fffdf5;
}

*{box-sizing:border-box}

body{
  margin:0;
  padding:18px;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
  flex-wrap:wrap;
}

h1{
  margin:0;
  font-size:22px;
}

.btn{
  border:none;
  border-radius:8px;
  padding:12px 16px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  color:var(--goldText);
}

.btn.secondary{
  background:#2f2f2f;
  color:white;
}

.hidden{
  display:none !important;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,minmax(220px,1fr));
  gap:18px;
  margin-bottom:18px;
}

.stat{
  background:var(--panel);
  border-radius:10px;
  padding:18px 22px;
  min-height:110px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.stat .label{
  font-size:16px;
  font-weight:bold;
  margin-bottom:8px;
}

.stat .value{
  font-size:24px;
  font-weight:800;
  line-height:1.1;
}

.stat .sub{
  margin-top:6px;
  color:var(--muted);
  font-size:15px;
}

.tableWrap{
  background:var(--panel2);
  border:1px solid var(--line);
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:14px 10px;
  border:1px solid var(--line);
  vertical-align:middle;
  text-align:left;
}

th{
  background:#f1eee7;
  font-size:16px;
}

td{
  font-size:16px;
}

.rank{
  width:70px;
  font-weight:bold;
}

.teamName{
  font-weight:bold;
  color:#575123;
}

.teamName.clickable{
  text-decoration:underline;
  cursor:pointer;
}

.weight{
  white-space:nowrap;
}

.photoCell{
  width:130px;
}

.teamPhoto{
  width:120px;
  height:78px;
  object-fit:cover;
  border-radius:6px;
  border:1px solid #cfc8ba;
  display:block;
}

.noPhoto{
  width:120px;
  height:78px;
  border-radius:6px;
  border:1px dashed #bbb29f;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f5f2eb;
  color:#8f8776;
  font-size:13px;
}

.detailBtn{
  border:none;
  border-radius:6px;
  padding:10px 14px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  color:var(--goldText);
}

.detailBtn:disabled{
  opacity:.45;
  cursor:default;
}

#detailView{
  margin-top:12px;
}

.detailHeader{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  margin-bottom:18px;
  flex-wrap:wrap;
}

.detailCard{
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:10px;
  padding:18px;
}

.detailTitle{
  font-size:28px;
  margin:0 0 8px 0;
}

.detailMeta{
  color:var(--muted);
  font-size:16px;
}

.summary{
  display:grid;
  grid-template-columns:repeat(3,minmax(180px,1fr));
  gap:14px;
  margin:18px 0;
}

.summary .box{
  background:var(--panel);
  border-radius:10px;
  padding:16px;
}

.summary .box .label{
  font-size:14px;
  color:var(--muted);
  margin-bottom:6px;
}

.summary .box .value{
  font-size:24px;
  font-weight:800;
}

.catchGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:16px;
}

.catchCard{
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
}

.catchCard .inside{
  padding:14px;
}

.catchWeight{
  font-size:26px;
  font-weight:800;
  margin-bottom:8px;
}

.catchMeta{
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

.catchImg{
  width:100%;
  height:210px;
  object-fit:cover;
  display:block;
  background:#ddd;
}

.empty{
  color:var(--muted);
  padding:18px 0;
  font-size:18px;
}

.status{
  margin:10px 0 16px 0;
  color:var(--muted);
  font-size:14px;
}

@media (max-width:900px){
  .stats{grid-template-columns:1fr}
  .summary{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>RCC Live tabuľka</h1>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="btn secondary hidden" id="backBtn" onclick="showMain()">← Späť na celkovú tabuľku</button>
    <button class="btn" onclick="window.location.reload()">Obnoviť</button>
  </div>
</div>

<div id="mainView">
  <div class="stats">
    <div class="stat">
      <div class="label">Celková váha ulovených rýb:</div>
      <div class="value" id="statTotalWeight">0 g</div>
    </div>

    <div class="stat">
      <div class="label">Celkový počet ulovených rýb:</div>
      <div class="value" id="statTotalCount">0</div>
    </div>

    <div class="stat">
      <div class="label">Najťažšia ryba:</div>
      <div class="value" id="statBiggest">0 g</div>
      <div class="sub" id="statBiggestTeam">—</div>
    </div>
  </div>

  <div class="status" id="statusText">Načítavam dáta…</div>

  <div class="tableWrap">
    <table>
      <thead>
        <tr>
          <th>Poradie</th>
          <th>Názov tímu</th>
          <th>Sektor</th>
          <th>Stanovište</th>
          <th>Celková váha</th>
          <th>Úlovky</th>
          <th>Foto tímu</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<div id="detailView" class="hidden">
  <div class="detailHeader">
    <div class="detailCard" style="flex:1;min-width:280px;">
      <h2 class="detailTitle" id="detailTeamName">Tím</h2>
      <div class="detailMeta" id="detailTeamMeta">Sektor — • Stanovište —</div>
    </div>
  </div>

  <div class="summary">
    <div class="box">
      <div class="label">Celková váha</div>
      <div class="value" id="detailTotal">0 g</div>
    </div>

    <div class="box">
      <div class="label">Počet rýb</div>
      <div class="value" id="detailCount">0</div>
    </div>

    <div class="box">
      <div class="label">Najväčšia ryba</div>
      <div class="value" id="detailBiggest">0 g</div>
    </div>
  </div>

  <div class="catchGrid" id="catchGrid"></div>
</div>

<script>
let state = null;
let currentTeamId = null;

function setStatus(text){
  document.getElementById("statusText").textContent = text;
}

function fmtWeightKgToG(kg){
  const grams = Math.round(Number(kg || 0) * 1000);
  return grams.toLocaleString("sk-SK") + " g";
}

function fmtTime(iso){
  if(!iso) return "";
  try{
    return new Date(iso).toLocaleString("sk-SK");
  }catch{
    return iso;
  }
}

function initials(name){
  return (name || "")
    .split(" ")
    .filter(Boolean)
    .slice(0,2)
    .map(x => x[0]?.toUpperCase() || "")
    .join("");
}

function getTeamPhoto(team){
  if(team && team.photo){
    return `<img class="teamPhoto" src="${team.photo}" alt="Foto tímu">`;
  }
  return `<div class="noPhoto">${initials(team?.name || "Tím")}</div>`;
}

function showMain(){
  currentTeamId = null;
  document.getElementById("mainView").classList.remove("hidden");
  document.getElementById("detailView").classList.add("hidden");
  document.getElementById("backBtn").classList.add("hidden");
}

function showTeam(teamId){
  if(!state) return;
  currentTeamId = teamId;

  const team = (state.lb || []).find(t => t.id === teamId);
  if(!team) return;

  const teamCatches = (state.teamCatches && state.teamCatches[teamId]) ? state.teamCatches[teamId] : [];

  document.getElementById("mainView").classList.add("hidden");
  document.getElementById("detailView").classList.remove("hidden");
  document.getElementById("backBtn").classList.remove("hidden");

  document.getElementById("detailTeamName").textContent = team.name;
  document.getElementById("detailTeamMeta").textContent = `Sektor ${team.sector} • Stanovište ${team.peg}`;
  document.getElementById("detailTotal").textContent = fmtWeightKgToG(team.total);
  document.getElementById("detailCount").textContent = team.count;
  document.getElementById("detailBiggest").textContent = fmtWeightKgToG(team.biggest);

  const grid = document.getElementById("catchGrid");
  grid.innerHTML = "";

  if(!teamCatches.length){
    grid.innerHTML = `<div class="empty">Tím zatiaľ nemá žiadne úlovky.</div>`;
    return;
  }

  teamCatches.forEach(c => {
    grid.innerHTML += `
      <div class="catchCard">
        ${c.photo ? `<img class="catchImg" src="${c.photo}" alt="Úlovok">` : ""}
        <div class="inside">
          <div class="catchWeight">${fmtWeightKgToG(c.weight)}</div>
          <div class="catchMeta">
            Úlovok #${c.number ?? "-"}<br>
            ${fmtTime(c.time)}
          </div>
        </div>
      </div>
    `;
  });
}

function renderStats(){
  const lb = state.lb || [];
  const totalWeight = lb.reduce((sum, t) => sum + Number(t.total || 0), 0);
  const totalCount = lb.reduce((sum, t) => sum + Number(t.count || 0), 0);
  const topFish = state.topFish || null;

  document.getElementById("statTotalWeight").textContent = fmtWeightKgToG(totalWeight);
  document.getElementById("statTotalCount").textContent = totalCount;

  if(topFish){
    document.getElementById("statBiggest").textContent = fmtWeightKgToG(topFish.weight);
    document.getElementById("statBiggestTeam").textContent = topFish.team || "—";
  } else {
    document.getElementById("statBiggest").textContent = "0 g";
    document.getElementById("statBiggestTeam").textContent = "Zatiaľ bez úlovku";
  }
}

function renderTable(){
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  (state.lb || []).forEach((team, index) => {
    body.innerHTML += `
      <tr>
        <td class="rank">${index + 1}</td>
        <td>
          <span class="teamName ${team.count > 0 ? "clickable" : ""}" ${team.count > 0 ? `onclick="showTeam(${team.id})"` : ""}>
            ${team.name}
          </span>
        </td>
        <td>${team.sector}</td>
        <td>${team.peg}</td>
        <td class="weight">${fmtWeightKgToG(team.total)}</td>
        <td>
          <button class="detailBtn" ${team.count > 0 ? `onclick="showTeam(${team.id})"` : "disabled"}>
            ÚLOVKY
          </button>
        </td>
        <td class="photoCell">${getTeamPhoto(team)}</td>
      </tr>
    `;
  });
}

function applyState(data){
  state = data;
  renderStats();
  renderTable();
  setStatus("Live dáta aktualizované");

  if(currentTeamId){
    showTeam(currentTeamId);
  }
}

async function load(){
  try{
    const res = await fetch("/api/state", { cache: "no-store" });
    const data = await res.json();
    applyState(data);
  }catch(e){
    setStatus("Chyba načítania dát");
  }
}

load();
setInterval(load, 4000);
</script>

</body>
</html>
