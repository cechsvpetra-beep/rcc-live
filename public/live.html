<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RCC Live tabuľka</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#111;
      color:#fff;
      margin:0;
      padding:20px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:15px;
    }
    h2{
      margin:0 0 15px 0;
    }
    .pdfbtn{
      padding:10px 14px;
      border:none;
      border-radius:8px;
      background:#3498db;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }
    .pdfbtn:hover{
      background:#2980b9;
    }
    .topfish{
      background:#1c2a1c;
      border:1px solid #355535;
      padding:15px;
      border-radius:12px;
      margin-bottom:20px;
    }
    .topfish h3{
      margin:0 0 8px 0;
      color:#7CFC98;
    }
    .topfish .big{
      font-size:28px;
      font-weight:bold;
    }
    .muted{
      color:#cfd8dc;
      font-size:14px;
      margin-top:6px;
    }
    .tabs{
      margin-bottom:15px;
    }
    .tabs button{
      padding:10px 14px;
      margin-right:6px;
      margin-bottom:6px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
      background:#333;
      color:#fff;
    }
    .tabs button.active{
      background:#2ecc71;
      color:#000;
    }
    table{
      width:100%;
      border-collapse:collapse;
      background:#1a1a1a;
      margin-bottom:25px;
    }
    th,td{
      border:1px solid #444;
      padding:10px;
      text-align:left;
    }
    th{
      background:#222;
    }
    tr:nth-child(1), tr:nth-child(2), tr:nth-child(3){
      background:#1f2d1f;
    }
    .feed{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap:15px;
      margin-bottom:30px;
    }
    .card{
      background:#1a1a1a;
      border:1px solid #444;
      border-radius:12px;
      overflow:hidden;
    }
    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
      display:block;
      background:#222;
    }
    .card .info{
      padding:12px;
    }
    .card .weight{
      font-size:22px;
      font-weight:bold;
      color:#7CFC98;
      margin-bottom:6px;
    }
    .card .meta{
      font-size:14px;
      color:#cfd8dc;
      margin-top:6px;
    }
    .sector-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap:15px;
    }
    .sector-box{
      background:#1a1a1a;
      border:1px solid #444;
      border-radius:12px;
      overflow:hidden;
    }
    .sector-box h3{
      margin:0;
      padding:12px;
      background:#222;
      color:#7CFC98;
    }
    .sector-box table{
      margin:0;
      font-size:14px;
    }
    .sector-box th, .sector-box td{
      padding:8px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h2>RCC Live tabuľka</h2>
    <button class="pdfbtn" onclick="exportPdf()">Export PDF</button>
  </div>

  <div class="topfish" id="topfish">
    <h3>🏆 Najväčšia ryba preteku</h3>
    <div class="big">Zatiaľ bez úlovku</div>
  </div>

  <div class="tabs" id="tabs"></div>

  <table id="t">
    <thead>
      <tr>
        <th>#</th>
        <th>Tím</th>
        <th>Sektor</th>
        <th>Stan.</th>
        <th>kg</th>
        <th>Kusy</th>
        <th>Najväčšia</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <h2>📸 Posledné úlovky</h2>
  <div class="feed" id="feed"></div>

  <h2>📊 Poradie sektorov</h2>
  <div class="sector-grid" id="sectorGrid"></div>

  <script>
    let allData = [];
    let currentFilter = "ALL";
    let sectorData = {};
    let activeSectors = ["A","B","C","D","E"];

    function fmtTime(iso){
      if(!iso) return "";
      try{
        return new Date(iso).toLocaleString("sk-SK");
      }catch{
        return iso;
      }
    }

    function buildTabs(){
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = "";

      const allBtn = document.createElement("button");
      allBtn.className = "tab active";
      allBtn.textContent = "CELKOVÉ";
      allBtn.onclick = () => setFilter("ALL", allBtn);
      tabs.appendChild(allBtn);

      activeSectors.forEach(sector => {
        const btn = document.createElement("button");
        btn.className = "tab";
        btn.textContent = sector;
        btn.onclick = () => setFilter(sector, btn);
        tabs.appendChild(btn);
      });
    }

    function setFilter(filter, btn){
      currentFilter = filter;
      document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    }

    function exportPdf(){
      const sector = currentFilter || "ALL";
      window.open(`/export/pdf?sector=${sector}`, "_blank");
    }

    function renderTopFish(topFish){
      const box = document.getElementById("topfish");

      if(!topFish){
        box.innerHTML = `
          <h3>🏆 Najväčšia ryba preteku</h3>
          <div class="big">Zatiaľ bez úlovku</div>
        `;
        return;
      }

      box.innerHTML = `
        <h3>🏆 Najväčšia ryba preteku</h3>
        <div class="big">${topFish.weight.toFixed(2)} kg</div>
        <div>${topFish.team} • sektor ${topFish.sector} • stanovište ${topFish.peg}</div>
        <div class="muted">Úlovok #${topFish.number || "-"} • ${fmtTime(topFish.time)}</div>
        ${topFish.photo ? `<div style="margin-top:10px;"><img src="${topFish.photo}" style="max-width:260px;border-radius:10px;"></div>` : ""}
      `;
    }

    function renderFeed(recent){
      const feed = document.getElementById("feed");

      feed.innerHTML = recent.map(item => `
        <div class="card">
          ${item.photo ? `<img src="${item.photo}" alt="Úlovok">` : `<div style="height:180px;background:#222;"></div>`}
          <div class="info">
            <div class="weight">${item.weight.toFixed(2)} kg</div>
            <div>${item.team}</div>
            <div class="meta">Sektor ${item.sector} • Stan. ${item.peg}</div>
            <div class="meta">Úlovok #${item.number || "-"} • ${fmtTime(item.time)}</div>
          </div>
        </div>
      `).join("");
    }

    function renderSectorRankings(){
      const grid = document.getElementById("sectorGrid");

      grid.innerHTML = activeSectors.map(sector => {
        const rows = sectorData[sector] || [];
        return `
          <div class="sector-box">
            <h3>Sektor ${sector}</h3>
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Tím</th>
                  <th>kg</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map(r => `
                  <tr>
                    <td>${r.sectorRank ?? "-"}</td>
                    <td>${r.name}</td>
                    <td>${r.total.toFixed(2)}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }).join("");
    }

    function render(){
      const body = document.querySelector("#t tbody");

      let data = allData;
      if(currentFilter !== "ALL"){
        data = allData.filter(r => r.sector === currentFilter);
      }

      body.innerHTML = data.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${r.name}</td>
          <td>${r.sector}</td>
          <td>${r.peg}</td>
          <td>${r.total.toFixed(2)}</td>
          <td>${r.count}</td>
          <td>${r.biggest.toFixed(2)}</td>
        </tr>
      `).join("");
    }

    const ws = new WebSocket("ws://" + location.host);

    ws.onmessage = e => {
      const data = JSON.parse(e.data);
      allData = data.lb;
      sectorData = data.sectorRankings || {};
      activeSectors = data.activeSectors || ["A","B","C","D","E"];
      buildTabs();
      renderTopFish(data.topFish);
      renderFeed(data.recent || []);
      renderSectorRankings();
      render();
    };
  </script>
</body>
</html>
