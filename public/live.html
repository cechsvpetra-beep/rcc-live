<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RCC Live tabuľka</title>

<style>

body{
background:#0b0d10;
color:white;
font-family:Arial;
padding:30px;
}

h1{
font-size:40px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
font-size:20px;
}

th{
background:#1c1f24;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #222;
}

tr:nth-child(1){
background:#3d2b00;
color:#ffd700;
font-weight:bold;
}

tr:nth-child(2){
background:#2c2c2c;
color:#c0c0c0;
font-weight:bold;
}

tr:nth-child(3){
background:#3b2600;
color:#cd7f32;
font-weight:bold;
}

tr:hover{
background:#1a1d21;
}

.rank{
font-weight:bold;
width:60px;
}

.team{
font-size:22px;
}

.weight{
font-weight:bold;
color:#7CFC98;
}

</style>
</head>

<body>

<h1>RCC Live tabuľka</h1>

<table>

<thead>
<tr>
<th>#</th>
<th>Tím</th>
<th>kg</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

async function load(){

const res = await fetch("/api/state")
const data = await res.json()

const body = document.getElementById("tableBody")

body.innerHTML=""

data.lb.forEach((t,i)=>{

body.innerHTML+=`
<tr>
<td class="rank">${i+1}</td>
<td class="team">${t.name}</td>
<td class="weight">${t.total.toFixed(2)}</td>
</tr>
`

})

}

load()

setInterval(load,3000)

</script>

</body>
</html>
