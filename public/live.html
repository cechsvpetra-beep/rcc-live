<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RCC Live</title>
</head>

<body style="background:#111;color:white;font-family:Arial">

<h1>RCC Live tabuľka</h1>

<div id="table"></div>

<script>

async function load(){

const res = await fetch("/api/state")
const data = await res.json()

let html = "<table border=1 cellpadding=10>"
html += "<tr><th>#</th><th>Tím</th><th>kg</th></tr>"

data.lb.forEach((t,i)=>{

html += `
<tr>
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.total.toFixed(2)}</td>
</tr>
`

})

html += "</table>"

document.getElementById("table").innerHTML = html

}

load()

setInterval(load,3000)

</script>

</body>
</html>
