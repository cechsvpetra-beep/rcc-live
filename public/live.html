<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>RCC Live tabuľka</title>

<style>

body{
background:#f4f1ea;
font-family:Arial;
margin:0;
padding:20px;
color:#222;
}

h1{
margin-bottom:10px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.btn{
background:#333;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.stat{
background:#e6e1d7;
padding:20px;
border-radius:10px;
}

.label{
font-weight:bold;
margin-bottom:6px;
}

.value{
font-size:26px;
font-weight:bold;
}

.sub{
color:#666;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#eee;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-top:1px solid #ddd;
}

.team{
font-weight:bold;
color:#6d6a2f;
cursor:pointer;
}

.weight{
font-weight:bold;
}

.detailBtn{
background:#9a8c36;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.hidden{
display:none;
}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:16px;
}

.catchGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:16px;
}

.catchCard{
background:white;
border:1px solid #ddd;
border-radius:10px;
overflow:hidden;
}

.catchImg{
width:100%;
height:200px;
object-fit:cover;
}

.catchWeight{
font-size:24px;
font-weight:bold;
}

.catchMeta{
color:#777;
font-size:14px;
}

</style>
</head>

<body>

<div class="topbar">

<h1>RCC Live tabuľka</h1>

<button class="btn hidden" id="backBtn" onclick="showMain()">← späť</button>

</div>


<!-- STATISTIKY -->

<div class="stats">

<div class="stat">
<div class="label">Celková váha rýb</div>
<div class="value" id="totalWeight">0 kg</div>
</div>

<div class="stat">
<div class="label">Počet ulovených rýb</div>
<div class="value" id="totalFish">0</div>
</div>

<div class="stat">
<div class="label">Najväčšia ryba</div>
<div class="value" id="topFishWeight">0 kg</div>
<div class="sub" id="topFishTeam">—</div>
</div>

</div>


<!-- TABUĽKA -->

<div id="mainView">

<table>

<thead>

<tr>
<th>#</th>
<th>Tím</th>
<th>Sektor</th>
<th>Stanovište</th>
<th>Celková váha</th>
<th>Úlovky</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>


<!-- DETAIL TÍMU -->

<div id="detailView" class="hidden">

<div class="card">

<h2 id="teamName"></h2>
<div id="teamMeta"></div>

</div>

<div class="catchGrid" id="catchGrid"></div>

</div>


<script>

let state=null

function showMain(){

document.getElementById("detailView").classList.add("hidden")
document.getElementById("mainView").classList.remove("hidden")
document.getElementById("backBtn").classList.add("hidden")

}

function showTeam(id){

const team=state.lb.find(t=>t.id===id)

const catches=state.teamCatches[id]||[]

document.getElementById("teamName").innerText=team.name
document.getElementById("teamMeta").innerText="Sektor "+team.sector+" | Stanovište "+team.peg

document.getElementById("mainView").classList.add("hidden")
document.getElementById("detailView").classList.remove("hidden")
document.getElementById("backBtn").classList.remove("hidden")

const grid=document.getElementById("catchGrid")

grid.innerHTML=""

catches.forEach(c=>{

grid.innerHTML+=`

<div class="catchCard">

${c.photo?`<img class="catchImg" src="${c.photo}">`:""}

<div style="padding:12px">

<div class="catchWeight">${Number(c.weight).toFixed(2)} kg</div>

<div class="catchMeta">

${new Date(c.time).toLocaleString("sk-SK")}

</div>

</div>

</div>

`

})

}

function renderTable(){

const body=document.getElementById("tableBody")

body.innerHTML=""

state.lb.forEach((t,i)=>{

body.innerHTML+=`

<tr>

<td>${i+1}</td>

<td class="team" onclick="showTeam(${t.id})">${t.name}</td>

<td>${t.sector}</td>

<td>${t.peg}</td>

<td class="weight">${Number(t.total).toFixed(2)} kg</td>

<td>

<button class="detailBtn" onclick="showTeam(${t.id})">

ÚLOVKY

</button>

</td>

</tr>

`

})

}

function renderStats(){

document.getElementById("totalWeight").innerText=

Number(state.totalWeight||0).toFixed(2)+" kg"

document.getElementById("totalFish").innerText=

state.totalFish||0

if(state.topFish){

document.getElementById("topFishWeight").innerText=

Number(state.topFish.weight).toFixed(2)+" kg"

document.getElementById("topFishTeam").innerText=

state.topFish.team

}

}

async function load(){

const r=await fetch("/api/state")

state=await r.json()

renderTable()

renderStats()

}

load()

setInterval(load,4000)

</script>

</body>
</html>
